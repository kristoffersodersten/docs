<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>AI-Arkitektur — Probabilism vs Signalarkitektur</title>

<script src="https://cdn.tailwindcss.com"></script>
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<style>
    body {
        background: #f5f5f4;
        color: #111827;
        font-family: Inter, ui-sans-serif, system-ui, sans-serif;
    }

    .glass {
        background: rgba(255,255,255,0.72);
        backdrop-filter: blur(12px);
    }

    .soft-shadow {
        box-shadow:
            0 1px 2px rgba(0,0,0,0.04),
            0 8px 24px rgba(0,0,0,0.05);
    }

    .signal-line {
        background-image: linear-gradient(
            to right,
            rgba(59,130,246,0.1),
            rgba(59,130,246,0.6),
            rgba(59,130,246,0.1)
        );
    }

    .noise-line {
        background-image: linear-gradient(
            to right,
            rgba(249,115,22,0.1),
            rgba(249,115,22,0.6),
            rgba(249,115,22,0.1)
        );
    }
</style>
</head>

<body>
<div id="root"></div>

<script type="text/babel">
const { useState } = React;

const Card = ({ title, children, accent }) => (
    <div className={`glass rounded-3xl border ${accent} p-6 soft-shadow`}>
        <h3 className="text-lg font-semibold tracking-tight mb-4">
            {title}
        </h3>
        {children}
    </div>
);

const PipelineBox = ({ label, sub, color }) => (
    <div className={`rounded-2xl border ${color} px-5 py-4 bg-white/70 soft-shadow min-w-[180px]`}>
        <div className="font-semibold text-sm tracking-tight">
            {label}
        </div>
        <div className="text-xs text-gray-500 mt-2 leading-relaxed">
            {sub}
        </div>
    </div>
);

const ComparisonTable = () => (
    <div className="overflow-x-auto">
        <table className="w-full text-sm border-collapse">
            <thead>
                <tr className="border-b border-gray-200">
                    <th className="text-left py-4">Dimension</th>
                    <th className="text-left py-4 text-orange-700">Språkstyrning</th>
                    <th className="text-left py-4 text-blue-700">Signalarkitektur</th>
                </tr>
            </thead>
            <tbody className="text-gray-700">
                {[
                    ["Källa till sanning", "Prompt + modell", "Schema + regler"],
                    ["Numerisk stabilitet", "Approximerad", "Deterministisk"],
                    ["Validering", "Språkinstruktioner", "Constraints + parser"],
                    ["Förklaringar", "Stark", "Stark"],
                    ["Revisionsbarhet", "Begränsad", "Hög"],
                    ["Drift över tid", "Risk för latent drift", "Stabil kärna"],
                    ["Utvecklingshastighet", "Snabb initialt", "Långsammare initialt"],
                    ["Skalbarhet", "Svår vid hög komplexitet", "God"],
                    ["Autonomi", "Riskfylld", "Kontrollerbar"],
                    ["Signal/brus", "LLM hanterar brus", "Brus reduceras före AI"]
                ].map((row, i) => (
                    <tr key={i} className="border-b border-gray-100">
                        <td className="py-4 font-medium">{row[0]}</td>
                        <td className="py-4 pr-6">{row[1]}</td>
                        <td className="py-4">{row[2]}</td>
                    </tr>
                ))}
            </tbody>
        </table>
    </div>
);

const App = () => {
    const [view, setView] = useState("overview");

    return (
        <div className="min-h-screen px-6 py-10">
            <div className="max-w-7xl mx-auto">

                <div className="mb-14">
                    <div className="text-xs uppercase tracking-[0.25em] text-gray-500 mb-4">
                        AI Architecture Study
                    </div>

                    <h1 className="text-5xl md:text-7xl font-black tracking-tight leading-none max-w-5xl">
                        Probabilism
                        <span className="text-gray-300"> vs </span>
                        Signalarkitektur
                    </h1>

                    <p className="mt-8 text-lg text-gray-600 max-w-3xl leading-relaxed">
                        En jämförelse mellan två fundamentalt olika sätt att bygga AI-system:
                        språkcentrerad kontroll ovanpå probabilistiska modeller kontra
                        deterministisk signalarkitektur med AI som begränsat semantiskt lager.
                    </p>
                </div>

                <div className="flex flex-wrap gap-3 mb-12">
                    {[
                        ["overview", "Översikt"],
                        ["flow", "Flöden"],
                        ["strengths", "Styrkor / Svagheter"],
                        ["inventory", "Lagerproblemet"]
                    ].map(([id, label]) => (
                        <button
                            key={id}
                            onClick={() => setView(id)}
                            className={`px-5 py-3 rounded-full text-sm transition border ${
                                view === id
                                ? "bg-black text-white border-black"
                                : "bg-white text-gray-700 border-gray-200 hover:border-gray-400"
                            }`}
                        >
                            {label}
                        </button>
                    ))}
                </div>

                {view === "overview" && (
                    <div className="grid lg:grid-cols-2 gap-8">

                        <Card
                            title="Modell A — Språkstyrning"
                            accent="border-orange-200"
                        >
                            <div className="space-y-5 text-sm leading-relaxed text-gray-700">
                                <p>
                                    Systemet försöker skapa stabilitet genom allt mer detaljerade prompts,
                                    kontrollprompts och modellkedjor.
                                </p>

                                <div className="rounded-2xl bg-orange-50 border border-orange-100 p-5">
                                    <div className="font-medium text-orange-800 mb-3">
                                        Grundidé
                                    </div>

                                    <div className="font-mono text-xs leading-relaxed text-orange-900">
                                        "Om vi bara beskriver reglerna tillräckligt noggrant
                                        kommer modellen bete sig deterministiskt."
                                    </div>
                                </div>

                                <div className="space-y-2">
                                    <div className="font-medium">Typiska tekniker</div>
                                    <ul className="list-disc ml-5 text-gray-600">
                                        <li>Långa systemprompts</li>
                                        <li>Chain-of-thought</li>
                                        <li>Multi-model consensus</li>
                                        <li>Prompt chaining</li>
                                        <li>Validation prompts</li>
                                    </ul>
                                </div>
                            </div>
                        </Card>

                        <Card
                            title="Modell B — Signalarkitektur"
                            accent="border-blue-200"
                        >
                            <div className="space-y-5 text-sm leading-relaxed text-gray-700">
                                <p>
                                    Systemet reducerar probabilismens ansvarsområde genom
                                    deterministiska lager före AI-modellen.
                                </p>

                                <div className="rounded-2xl bg-blue-50 border border-blue-100 p-5">
                                    <div className="font-medium text-blue-800 mb-3">
                                        Grundidé
                                    </div>

                                    <div className="font-mono text-xs leading-relaxed text-blue-900">
                                        "AI ska inte bära sanningen.
                                        AI ska arbeta ovanpå stabiliserad signal."
                                    </div>
                                </div>

                                <div className="space-y-2">
                                    <div className="font-medium">Typiska tekniker</div>
                                    <ul className="list-disc ml-5 text-gray-600">
                                        <li>Canonical schemas</li>
                                        <li>Constraint engines</li>
                                        <li>Event sourcing</li>
                                        <li>Anomaly detection</li>
                                        <li>Semantiska lager ovanpå regler</li>
                                    </ul>
                                </div>
                            </div>
                        </Card>
                    </div>
                )}

                {view === "flow" && (
                    <div className="space-y-14">

                        <div>
                            <div className="flex items-center gap-4 mb-8">
                                <div className="w-10 h-px noise-line"></div>
                                <h2 className="text-2xl font-bold tracking-tight text-orange-700">
                                    Promptkedja
                                </h2>
                            </div>

                            <div className="flex flex-wrap items-center gap-5">
                                <PipelineBox
                                    label="Rådata"
                                    sub="Excel / CSV / ERP"
                                    color="border-gray-200"
                                />

                                <div className="w-12 h-px noise-line"></div>

                                <PipelineBox
                                    label="Prompt 0"
                                    sub="Validering via språk"
                                    color="border-orange-200"
                                />

                                <div className="w-12 h-px noise-line"></div>

                                <PipelineBox
                                    label="Prompt 1"
                                    sub="Datatvätt och normalisering"
                                    color="border-orange-200"
                                />

                                <div className="w-12 h-px noise-line"></div>

                                <PipelineBox
                                    label="Prompt 2–4"
                                    sub="Klassificering och lagerlogik"
                                    color="border-orange-200"
                                />

                                <div className="w-12 h-px noise-line"></div>

                                <PipelineBox
                                    label="LLM Output"
                                    sub="Rapport / rekommendation"
                                    color="border-red-200"
                                />
                            </div>
                        </div>

                        <div>
                            <div className="flex items-center gap-4 mb-8">
                                <div className="w-10 h-px signal-line"></div>
                                <h2 className="text-2xl font-bold tracking-tight text-blue-700">
                                    Signalarkitektur
                                </h2>
                            </div>

                            <div className="flex flex-wrap items-center gap-5">
                                <PipelineBox
                                    label="Rådata"
                                    sub="ERP / Event streams"
                                    color="border-gray-200"
                                />

                                <div className="w-12 h-px signal-line"></div>

                                <PipelineBox
                                    label="Preparsers"
                                    sub="Canonicalization / noise reduction"
                                    color="border-blue-200"
                                />

                                <div className="w-12 h-px signal-line"></div>

                                <PipelineBox
                                    label="Typed schemas"
                                    sub="Constraints / referential integrity"
                                    color="border-blue-200"
                                />

                                <div className="w-12 h-px signal-line"></div>

                                <PipelineBox
                                    label="Rule engine"
                                    sub="Deterministisk lagerlogik"
                                    color="border-blue-200"
                                />

                                <div className="w-12 h-px signal-line"></div>

                                <PipelineBox
                                    label="Anomaly + Semantics"
                                    sub="Residual analysis / vector relations"
                                    color="border-blue-200"
                                />

                                <div className="w-12 h-px signal-line"></div>

                                <PipelineBox
                                    label="LLM Layer"
                                    sub="Förklaring / hypoteser"
                                    color="border-green-200"
                                />
                            </div>
                        </div>
                    </div>
                )}

                {view === "strengths" && (
                    <div className="space-y-12">

                        <ComparisonTable />

                        <div className="grid lg:grid-cols-2 gap-8">

                            <Card
                                title="När språkstyrning är stark"
                                accent="border-orange-200"
                            >
                                <ul className="space-y-3 text-sm text-gray-700 leading-relaxed">
                                    <li>• Tidig exploration</li>
                                    <li>• När regler ännu är oklara</li>
                                    <li>• Snabb prototyping</li>
                                    <li>• Ostrukturerad information</li>
                                    <li>• Semantiska resonemang</li>
                                    <li>• Rapporter och kommunikation</li>
                                </ul>
                            </Card>

                            <Card
                                title="När signalarkitektur är stark"
                                accent="border-blue-200"
                            >
                                <ul className="space-y-3 text-sm text-gray-700 leading-relaxed">
                                    <li>• Höga ekonomiska konsekvenser</li>
                                    <li>• Lager och supply chain</li>
                                    <li>• Revisionskrav</li>
                                    <li>• Numerisk precision</li>
                                    <li>• Stegvis autonomi</li>
                                    <li>• Skalbara beslutssystem</li>
                                </ul>
                            </Card>
                        </div>
                    </div>
                )}

                {view === "inventory" && (
                    <div className="grid lg:grid-cols-2 gap-8">

                        <Card
                            title="Vad som sannolikt händer idag"
                            accent="border-red-200"
                        >
                            <div className="space-y-4 text-sm leading-relaxed text-gray-700">
                                <p>
                                    Lagret verkar bete sig som historiskt sedimenterad struktur snarare än adaptivt flöde.
                                </p>

                                <ul className="list-disc ml-5 space-y-2">
                                    <li>40+ MSEK bundet kapital</li>
                                    <li>Expressköp trots stort lager</li>
                                    <li>Fel artiklar finns hemma</li>
                                    <li>Historiska toppar styr nutiden</li>
                                    <li>Ledtid och verklig risk är underrepresenterade</li>
                                </ul>
                            </div>
                        </Card>

                        <Card
                            title="Vad signalarkitekturen försöker uppnå"
                            accent="border-green-200"
                        >
                            <div className="space-y-4 text-sm leading-relaxed text-gray-700">
                                <p>
                                    Målet är inte bara lägre lagervärde, utan ett självdiagnostiserande flödessystem.
                                </p>

                                <ul className="list-disc ml-5 space-y-2">
                                    <li>Demand topology istället för statiskt saldo</li>
                                    <li>Expressköp som diagnostisk signal</li>
                                    <li>Residualanalys och anomalier</li>
                                    <li>Semantiska substitutionsfamiljer</li>
                                    <li>Gradvis övergång mot transient inventory</li>
                                </ul>
                            </div>
                        </Card>
                    </div>
                )}

                <div className="mt-16 border-t border-gray-200 pt-8 text-xs text-gray-500 leading-relaxed">
                    <div className="max-w-4xl">
                        Kärninsikten är inte att eliminera AI, utan att placera AI där
                        probabilistiska system faktiskt är starka:
                        semantik, relationer, förklaringar, hypoteser och mönster.
                        Numerisk sanning, constraints och operationell logik bör däremot
                        ligga i deterministiska lager.
                    </div>
                </div>
            </div>
        </div>
    );
};

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App />);
</script>
</body>
</html>
